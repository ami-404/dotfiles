set -g prefix ^B

bind-key v display-popup -w 60% -h 70% -E -d $pwd -S $SHELL
bind-key H display-popup -w 50% -h 60% -E "htop"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux'

# Configure the catppuccin plugin
set -g @catppuccin_flavor 'mocha' # latte, frappe, macchiato or mocha
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,( ),}"

set-option -g default-terminal 'screen-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'

# Options to make tmux more pleasant
set -g mouse on
set -g default-terminal "tmux-256color"
set -g base-index 1 
set -g status-position top
set -g history-limit 10000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
setw -g mode-keys vi

bind-key -n M-Left send-keys M-b
bind-key -n M-Right send-keys M-f


# set -g @catppuccin_status_modules "application session cpu uptime"

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 50
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"         # TODO: fix cpu status
set -ag status-right "#{E:@catppuccin_status_session}"
# set -ag status-right "#{E:@catppuccin_status_}"
# set -ag status-right "#[fg=cyan] %I:%M"
set -ag status-right "#{E:@catppuccin_status_uptime}"
# set -agF status-right "#{E:@catppuccin_status_battery}"

run '~/.tmux/plugins/tpm/tpm'
