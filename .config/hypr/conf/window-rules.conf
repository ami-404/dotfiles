# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
# windowrulev2 = suppressevent maximize, class:.*

windowrule =  match:class .*, suppress_event maximize

# Fix some dragging issues with XWayland
# windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# windowrulev2 = float, class:^(nm-connection-editor)$
windowrule = match:class ^(nm-connection-editor)$, float 1


windowrule = match:class ^(galculator)$, float 1

# windowrulev2 = float, initialClas: thunar, title: Rename: .*
# windowrule = match:class ^(thunar)$, match:title ^(Rename.*)$, float 1
windowrule = match:class ^(thunar)$, match:title .*Rename.*, float 1


windowrule = match:class ^(thunar)$, match:title .*File Operation Progress.*, float 1

windowrule = match:class Tk, float 1

windowrule = match:class mpv, float 1

windowrule = match:class firefox, match:title Picture-in-Picture, float 1

windowrule = match:title ^(Open File)$, float 1

